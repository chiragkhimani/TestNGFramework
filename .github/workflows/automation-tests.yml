name: TestNG Automation Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  qodana-scan:
    name: Qodana static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Qodana analysis
        uses: jetbrains/qodana-action@v2025.2
        with:
          # Use the same linter image configured in qodana.yaml
          qodana-image: jetbrains/qodana-jvm-community:2025.2
          output-path: qodana-report
          cache: true

      - name: Upload Qodana report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qodana-report
          path: qodana-report

  automation-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: ['21']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install system dependencies for Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libxss1 fonts-liberation xdg-utils libgbm1
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven
      
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
      
      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@master
      
      - name: Build project
        run: mvn clean compile
      
      - name: Run automation tests
        run: mvn test
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
      
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-reports
          path: target/surefire-reports/html/

