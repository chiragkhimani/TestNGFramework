name: Scheduled TestNG Automation Tests

on:
  schedule:
    # Run tests daily at 2:00 AM UTC (adjust as needed)
    - cron: '0 2 * * *'
    # Run tests every Monday and Friday at 9:00 AM UTC
    - cron: '0 9 * * MON,FRI'

jobs:
  scheduled-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install system dependencies for Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libxss1 fonts-liberation xdg-utils libgbm1
      
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest
      
      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@master
      
      - name: Build project
        run: mvn clean compile
      
      - name: Run all automation tests
        run: mvn test
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-surefire-reports
          path: target/surefire-reports/
      
      - name: Notify on failure
        if: failure()
        run: echo "Scheduled tests failed! Check the artifacts and logs."

